# C-06, F-07, A-02, A-03
# MCP Allowlist — Phase-based tool gating per agent scope

# Each agent scope defines allowed tools per phase:
#   plan:     read-only tools (inspect, validate, search)
#   execute:  write tools (create branch, write files, commit, push, create_pr)
#   evaluate: diagnostic tools (read logs, read memory, add labels)

plan:
  agent-backend:
    tools:
      - read_file
      - search_files
      - read_memory
      - validate_schema
    allow_write: false

  agent-frontend:
    tools:
      - read_file
      - search_files
      - read_memory
    allow_write: false

  agent-db:
    tools:
      - read_file
      - search_files
      - read_memory
      - validate_schema
    allow_write: false

execute:
  agent-backend:
    tools:
      - write_file
      - create_branch
      - commit
      - push
      - create_pr
      - run_tests
      - run_lint
      - run_typecheck
      - read_memory
      - write_memory
    allow_write: true
    retry_limit: 3

  agent-frontend:
    tools:
      - write_file
      - create_branch
      - commit
      - push
      - create_pr
      - run_tests
      - run_lint
      - read_memory
      - write_memory
    allow_write: true
    retry_limit: 3

  agent-db:
    tools:
      - write_file
      - create_branch
      - commit
      - push
      - create_pr
      - run_tests
      - run_migrations
      - read_memory
      - write_memory
    allow_write: true
    retry_limit: 3
    requires_human_review: true

evaluate:
  agent-backend:
    tools:
      - read_ci_logs
      - read_memory
      - write_memory
      - add_label
    allow_write: true
    allowed_labels:
      - needs-human
      - agent-escalated

  agent-frontend:
    tools:
      - read_ci_logs
      - read_memory
      - write_memory
      - add_label
    allow_write: true
    allowed_labels:
      - needs-human
      - agent-escalated

  agent-db:
    tools:
      - read_ci_logs
      - read_memory
      - write_memory
      - add_label
    allow_write: true
    allowed_labels:
      - needs-human
      - agent-escalated
