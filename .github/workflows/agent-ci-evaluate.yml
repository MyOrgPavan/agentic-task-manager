name: Agent - Evaluate
# A-05, B-02, E-02, E-03, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: agent-evaluate-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  evaluate-failures:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Identify failed PR and ticket
        id: identify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          gh pr list --head "$BRANCH" --json number --jq '.[0].number' > /tmp/pr_number.txt 2>/dev/null || echo "" > /tmp/pr_number.txt
          PR_NUMBER=$(cat /tmp/pr_number.txt)
          TICKET=$(echo "$BRANCH" | grep -oP '\d+' | tail -1 || echo "0000")
          SCOPE=$(echo "$BRANCH" | grep -oP '^[^/]+' || echo "backend")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "ticket=$TICKET" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Read CI failure logs
        id: logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          JOBS_URL="https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs"
          FAILURES=$(curl -sL -H "Authorization: token $GH_TOKEN" "$JOBS_URL" | \
            python3 scripts/fetch_failures.py 2>/dev/null || echo "Could not fetch logs")
          echo "failures<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILURES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Add escalation label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.identify.outputs.pr_number }}"
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "needs-human"
          fi
