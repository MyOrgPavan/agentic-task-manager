# F-03, F-01c, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11
name: Phase 2 - Auto-Merge Low Risk

on:
  pull_request:
    types: [labeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: phase2-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: contains(github.event.pull_request.labels.*.name, 'low-risk')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest backend/tests/ -v
      - name: Auto-merge
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto
      - uses: actions/upload-artifact@v4
        with:
          name: phase2-evidence
          path: .
