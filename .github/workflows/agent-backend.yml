name: Agent - Backend
# D-01, D-03, D-06, B-02, A-01, A-02, A-03, A-04, A-05, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: "Issue or ticket ID"
        required: true
      command:
        description: "Command for the backend agent"
        required: true
  workflow_run:
    workflows: ["Agent - Database"]
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: agent-backend-${{ github.event.inputs.ticket_id }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      plan_exists: ${{ steps.generate.outputs.plan_exists }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Generate plan with opencode
        id: generate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TICKET="${{ github.event.inputs.ticket_id }}"
          COMMAND="${{ github.event.inputs.command }}"
          mkdir -p plans
          if [ ! -f "plans/plan-${TICKET}.md" ]; then
            echo "Generating plan for #${TICKET}..."
            opencode run -m opencode/big-pickle \
              --dangerously-skip-permissions --print-logs \
              "You are a backend architect. Study the codebase.
               Create file plans/plan-${TICKET}.md with sections:
               ## Scope, ## Ticket / Issue, ## Risk Level, ## Description,
               ## Success Criteria (checklist), ## Files to Modify (paths),
               ## Implementation Steps (numbered), ## Rollback Strategy.
               Do NOT write code. Only create the plan file.
               User request: ${COMMAND}"
            echo "plan_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Plan already exists at plans/plan-${TICKET}.md"
            echo "plan_exists=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: backend-plan
          path: plans/

  execute:
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Create implementation branch
        run: |
          BRANCH="impl/backend/${{ github.event.inputs.ticket_id }}"
          git config user.name "agent-backend"
          git config user.email "agent-backend@github.local"
          git checkout -b "$BRANCH"

      - name: Implement changes with opencode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TICKET="${{ github.event.inputs.ticket_id }}"
          COMMAND="${{ github.event.inputs.command }}"
          PLAN_FILE="plans/plan-${TICKET}.md"
          if [ -f "$PLAN_FILE" ]; then
            echo "Implementing plan from ${PLAN_FILE}..."
            opencode run -m opencode/big-pickle \
              --dangerously-skip-permissions --print-logs \
              "Read plan file ${PLAN_FILE} and implement every step.
               You are a backend agent working with Flask, SQLAlchemy, and Python.
               Make the exact file modifications described in the plan.
               After modifying files, run: pytest backend/tests/ -v"
          else
            echo "No plan file found. Using command directly..."
            opencode run -m opencode/big-pickle \
              --dangerously-skip-permissions --print-logs \
              "You are a backend agent working with Flask, SQLAlchemy, and Python.
               ${COMMAND}
               After modifying files, run: pytest backend/tests/ -v"
          fi

      - name: Run tests
        run: |
          pytest backend/tests/ -v || echo "TESTS_FAILED=true" >> $GITHUB_ENV

      - name: Commit and push changes
        run: |
          git config user.name "agent-backend"
          git config user.email "agent-backend@github.local"
          git add -A
          git diff --cached --quiet || git commit -m "Implement: backend / ${{ github.event.inputs.ticket_id }}"
          git push origin "impl/backend/${{ github.event.inputs.ticket_id }}" || echo "No changes to push"

      - name: Create implementation PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
        run: |
          TICKET="${{ github.event.inputs.ticket_id }}"
          BRANCH="impl/backend/${TICKET}"
          PLAN_FILE="plans/plan-${TICKET}.md"
          BODY_FILE="$PLAN_FILE"
          if [ ! -f "$BODY_FILE" ]; then
            printf "## Scope\nbackend\n\n## Ticket\n#%s\n\n## Changes\n%s" "$TICKET" "${{ github.event.inputs.command }}" > /tmp/pr-body.md
            BODY_FILE="/tmp/pr-body.md"
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Implement: backend / ${TICKET}" \
            --body-file "$BODY_FILE" \
            --label backend || echo "PR may already exist"

      - uses: actions/upload-artifact@v4
        with:
          name: backend-evidence
          path: .
