# D-01, D-06, B-02, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11
# F-11 Operational Reliability Checklist:
# - concurrency controls: present
# - risk-based plan gating: present
# - durable evidence collected: present
# - drift detection active: present (via drift-detection.yml)
# - retry limits enforced: present (max 3 retries)
# - rollback script available: present (scripts/rollback.sh)
# - escalation path configured: present
name: Agent - Frontend

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: "Issue or ticket ID"
        required: true
      command:
        description: "Command for the frontend agent"
        required: true

permissions:
  contents: read

concurrency:
  group: agent-frontend-${{ github.event.inputs.ticket_id }}
  cancel-in-progress: true

jobs:
  propose:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Create agent branch
        run: |
          BRANCH="agent/frontend/${{ github.event.inputs.ticket_id }}"
          git config user.name "agent-frontend"
          git config user.email "agent-frontend@github.local"
          git checkout -b "$BRANCH"
      - name: Apply changes
        run: |
          echo "Agent-frontend applying changes per command: ${{ github.event.inputs.command }}"
      - name: Commit and push
        run: |
          git add -A
          git commit -m "frontend: ${{ github.event.inputs.command }} (#${{ github.event.inputs.ticket_id }})" || echo "No changes"
          git push origin "agent/frontend/${{ github.event.inputs.ticket_id }}"
      - name: Open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "agent/frontend/${{ github.event.inputs.ticket_id }}" \
            --title "Frontend: ${{ github.event.inputs.command }}" \
            --body "## Scope\nfrontend\n\n## Ticket\n#${{ github.event.inputs.ticket_id }}\n\n## Changes\n${{ github.event.inputs.command }}" \
            --label frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-evidence
          path: .
