name: Failure Analysis
# E-10, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11
# F-11 Operational Reliability Checklist:
# - concurrency controls: present
# - risk-based plan gating: present
# - durable evidence collected: present
# - drift detection active: present (via drift-detection.yml)
# - retry limits enforced: present (max 3 retries)
# - rollback script available: present (scripts/rollback.sh)
# - escalation path configured: present

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  issues: write

concurrency:
  group: failure-analysis-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - uses: actions/checkout@v4
      - name: Collect failure context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          gh run view "$RUN_ID" --log > failure-log.txt
          gh run view "$RUN_ID" --json conclusion,headBranch,headSha,createdAt >> failure-context.json
      - name: Create failure issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "CI Failure: Workflow Run #${{ github.event.workflow_run.id }}" \
            --body "## Failure Analysis\nRun: ${{ github.event.workflow_run.html_url }}\nBranch: ${{ github.event.workflow_run.head_branch }}\n\n## Logs\nSee attached artifact for full logs." \
            --label failure
      - uses: actions/upload-artifact@v4
        with:
          name: failure-evidence
          path: failure-log.txt
