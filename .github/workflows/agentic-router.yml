name: Agentic Workflow Processor
# C-04, A-02, A-03
# GitHub Agentic Workflow format: processes markdown intent + frontmatter + lock file
# Routes issues to the correct agent based on labels

on:
  push:
    paths:
      - "agent-intents/*.md"
  workflow_dispatch:
    inputs:
      intent_file:
        description: "Path to intent markdown file"
        required: true
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: agentic-workflow-processor-${{ github.event.issue.number || github.event.inputs.intent_file }}
  cancel-in-progress: true

jobs:
  route-from-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      actions: write
    outputs:
      scope: ${{ steps.route.outputs.scope }}
      ticket: ${{ steps.route.outputs.ticket }}
    steps:
      - id: route
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '.labels[].name')
          TITLE="${{ github.event.issue.title }}"

          # Route based on label
          SCOPE="backend"
          if echo "$LABELS" | grep -q "frontend"; then
            SCOPE="frontend"
          elif echo "$LABELS" | grep -q "db"; then
            SCOPE="db"
          elif echo "$LABELS" | grep -q "documentation"; then
            SCOPE="docs"
          elif echo "$LABELS" | grep -q "infra"; then
            SCOPE="infra"
          fi

          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "ticket=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

      - name: Trigger plan workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SCOPE="${{ steps.route.outputs.scope }}"
          TICKET="${{ steps.route.outputs.ticket }}"
          gh workflow run "Agent - Plan" \
            --ref main \
            --field scope="$SCOPE" \
            --field ticket_id="$TICKET"

  parse-intent:
    if: github.event_name != 'issues'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install PyYAML

      - name: Parse markdown intent with frontmatter
        shell: bash
        run: |
          INTENT_FILE="${{ github.event.inputs.intent_file || format('agent-intents/{0}', github.event.head_commit.modified[0]) }}"
          if [ ! -f "$INTENT_FILE" ]; then
            INTENT_FILE=$(ls -t agent-intents/*.md 2>/dev/null | head -1)
            if [ -z "$INTENT_FILE" ]; then
              echo "No intent files found in agent-intents/"
              exit 1
            fi
          fi
          echo "Processing intent file: $INTENT_FILE"

          FRONTMATTER=$(python3 -c "
import yaml, re
with open('$INTENT_FILE') as f:
    content = f.read()
match = re.match(r'^---\s*\n(.*?)\n---\s*\n', content, re.DOTALL)
if match:
    data = yaml.safe_load(match.group(1))
    for k, v in data.items():
        print(f'{k}={v}')
else:
    print('ERROR: No YAML frontmatter found')
    exit(1)
")
          echo "$FRONTMATTER"
          echo "$FRONTMATTER" >> $GITHUB_ENV

      - name: Create lock file
        run: |
          mkdir -p locks
          INTENT_FILE="${{ github.event.inputs.intent_file || format('agent-intents/{0}', github.event.head_commit.modified[0]) }}"
          LOCK_FILE="locks/$(basename "$INTENT_FILE" .md).lock"
          echo "Lock created at $(date)" > "$LOCK_FILE"
          git config user.name "agentic-workflow-processor"
          git config user.email "processor@github.local"
          git add "$LOCK_FILE"
          git commit -m "lock: $(basename "$INTENT_FILE")" || echo "Lock already exists or committed"
          git push

      - name: Dispatch agent workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SCOPE="${SCOPE:-backend}"
          TICKET="${TICKET:-0000}"
          COMMAND="${COMMAND:-execute}"
          gh workflow run "Agent - ${SCOPE^}" \
            --ref main \
            --field ticket_id="$TICKET" \
            --field command="$COMMAND"

      - uses: actions/upload-artifact@v4
        with:
          name: intent-processed
          path: agent-intents/
