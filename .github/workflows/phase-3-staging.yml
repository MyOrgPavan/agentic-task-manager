name: Phase 3 - Auto-Deploy to Staging
# F-03, F-01c, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: phase3-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest backend/tests/ -v

      - name: Create .env for Docker
        run: cp .env.example .env

      - name: Build Docker image
        run: |
          docker compose build staging

      - name: Deploy staging container
        run: |
          echo "Stopping existing staging container..."
          docker compose stop staging || true
          docker compose rm -f staging || true
          echo "Starting new staging container..."
          docker compose up -d staging
          echo "Staging deployment complete."
          echo "Container: task-manager-staging"
          echo "Port: 8082"

      - name: Health check
        run: |
          sleep 3
          curl -sf http://localhost:8082/ || echo "Warning: Health check failed"

      - uses: actions/upload-artifact@v4
        with:
          name: staging-deployment
          path: .
