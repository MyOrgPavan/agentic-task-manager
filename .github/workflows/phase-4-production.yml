name: Phase 4 - Production (Environment Gate)
# F-03, F-01d, F-08, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy to production"
        required: true
        default: "main"

permissions:
  contents: read

concurrency:
  group: phase4-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest backend/tests/ -v

      - name: Create .env for Docker
        run: cp .env.example .env

      - name: Build production Docker image
        run: |
          docker compose build production

      - name: Deploy production container
        run: |
          echo "Deploying ${{ github.event.inputs.ref }} to production..."
          docker compose stop production || true
          docker compose rm -f production || true
          docker compose up -d production
          echo "Production deployment complete."
          echo "Container: task-manager-prod"
          echo "Port: 8080"

      - name: Health check
        run: |
          sleep 5
          curl -sf http://localhost:8080/ || echo "Warning: Health check failed"

      - uses: actions/upload-artifact@v4
        with:
          name: production-deployment
          path: .
