name: Agent - Database
# D-01, D-03, D-06, B-02, A-01, A-02, A-03, A-04, A-05, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: "Issue or ticket ID"
        required: true
      command:
        description: "Command for the DB agent"
        required: true

permissions:
  contents: read

concurrency:
  group: agent-db-${{ github.event.inputs.ticket_id }}
  cancel-in-progress: true

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Install opencode
        run: npm install -g @opencode/cli

      - name: Create agent branch
        run: |
          BRANCH="impl/db/${{ github.event.inputs.ticket_id }}"
          git config user.name "agent-db"
          git config user.email "agent-db@github.local"
          git checkout -b "$BRANCH"

      - name: Invoke coding agent
        env:
          OPENCODE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/agent-wrapper.sh \
            execute \
            db \
            "${{ github.event.inputs.ticket_id }}" \
            "${{ github.event.inputs.command }}"

      - name: Verify tests pass
        run: |
          pytest backend/tests/ -v || echo "TESTS_FAILED=true" >> $GITHUB_ENV

      - name: Self-correct on failure
        if: env.TESTS_FAILED == 'true'
        env:
          OPENCODE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 3); do
            echo "--- Retry $i/3 ---"
            bash scripts/agent-wrapper.sh \
              evaluate \
              db \
              "${{ github.event.inputs.ticket_id }}" \
              "Fix test failures. Run 'pytest backend/tests/' and ensure all pass."
            pytest backend/tests/ -v && { echo "All tests pass"; exit 0; }
          done
          echo "Max retries reached. Escalating."
          echo "ESCALATED=true" >> $GITHUB_ENV

      - name: Add escalation label
        if: env.ESCALATED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "${{ github.event.inputs.ticket_id }}" --add-label "needs-human"

      - name: Commit and push
        if: env.ESCALATED != 'true'
        run: |
          git add -A
          git commit -m "db: ${{ github.event.inputs.command }} (#${{ github.event.inputs.ticket_id }})" || echo "No changes"
          git push origin "impl/db/${{ github.event.inputs.ticket_id }}"

      - name: Open PR
        if: env.ESCALATED != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "impl/db/${{ github.event.inputs.ticket_id }}" \
            --title "DB: ${{ github.event.inputs.command }}" \
            --body "## Scope\ndb\n\n## Ticket\n#${{ github.event.inputs.ticket_id }}\n## Risk\nhigh - schema changes\n\n## Changes\n${{ github.event.inputs.command }}" \
            --label db

      - uses: actions/upload-artifact@v4
        with:
          name: db-evidence
          path: .
