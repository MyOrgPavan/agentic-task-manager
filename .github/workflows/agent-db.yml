name: Agent - Database
# D-01, D-03, D-06, B-02, A-01, A-02, A-03, A-04, A-05, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: "Issue or ticket ID"
        required: true
      command:
        description: "Command for the DB agent"
        required: true

permissions:
  contents: read

concurrency:
  group: agent-db-${{ github.event.inputs.ticket_id }}
  cancel-in-progress: true

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Create implementation branch
        run: |
          BRANCH="impl/db/${{ github.event.inputs.ticket_id }}"
          git config user.name "agent-db"
          git config user.email "agent-db@github.local"
          git checkout -b "$BRANCH"

      - name: Run tests
        run: |
          pytest backend/tests/ -v

      - name: Create implementation PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          TICKET="${{ github.event.inputs.ticket_id }}"
          BRANCH="impl/db/${TICKET}"
          PLAN_FILE="plans/plan-${TICKET}.md"
          BODY_FILE="$PLAN_FILE"
          if [ ! -f "$BODY_FILE" ]; then
            printf "## Scope\ndb\n\n## Ticket\n#%s\n## Risk\nhigh - schema changes\n\n## Changes\n%s" "$TICKET" "${{ github.event.inputs.command }}" > /tmp/pr-body.md
            BODY_FILE="/tmp/pr-body.md"
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "DB: ${{ github.event.inputs.command }}" \
            --body-file "$BODY_FILE" \
            --label db || echo "PR may already exist"

      - uses: actions/upload-artifact@v4
        with:
          name: db-evidence
          path: .
