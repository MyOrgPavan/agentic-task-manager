name: Agent - Execute
# A-01, A-03, A-04, B-03, A-05, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11

on:
  pull_request:
    types: [opened, synchronize, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number with approved plan"
        required: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: agent-execute-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  check-plan-approved:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      approved: ${{ steps.check.outputs.approved }}
      scope: ${{ steps.parse.outputs.scope }}
      ticket: ${{ steps.parse.outputs.ticket }}
    steps:
      - id: parse
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body')
          SCOPE=$(echo "$BODY" | grep -oP '## Scope\n\K\w+' || echo "backend")
          TICKET=$(echo "$BODY" | grep -oP '#\K\d+' | head -1 || echo "0000")
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "ticket=$TICKET" >> $GITHUB_OUTPUT
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "plan-approved"; then
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "approved=false" >> $GITHUB_OUTPUT
          fi

  execute:
    needs: check-plan-approved
    if: needs.check-plan-approved.outputs.approved == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || format('agent/execute/{0}', github.event.inputs.pr_number) }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Create implementation PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SCOPE="${{ needs.check-plan-approved.outputs.scope }}"
          TICKET="${{ needs.check-plan-approved.outputs.ticket }}"
          PLAN_FILE="plans/plan-${TICKET}.md"

          if [ -f "$PLAN_FILE" ]; then
            python3 scripts/create_impl_pr.py --scope "$SCOPE" --ticket "$TICKET" --plan-file "$PLAN_FILE"
          else
            echo "Plan file $PLAN_FILE not found. Creating PR with ticket info."
          fi

      - name: Run tests
        run: |
          pytest backend/tests/ -v || echo "TESTS_FAILED=true" >> $GITHUB_ENV

      - name: Open implementation PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          SCOPE="${{ needs.check-plan-approved.outputs.scope }}"
          TICKET="${{ needs.check-plan-approved.outputs.ticket }}"
          BRANCH="impl/${SCOPE}/${TICKET}"
          PLAN_FILE="plans/plan-${TICKET}.md"
          BODY_FILE="$PLAN_FILE"
          if [ ! -f "$BODY_FILE" ]; then
            echo "Implementation of scope=${SCOPE} ticket=${TICKET}" > /tmp/pr-body.md
            BODY_FILE="/tmp/pr-body.md"
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Implement: ${SCOPE} / ${TICKET}" \
            --body-file "$BODY_FILE" \
            --label implementation

      - uses: actions/upload-artifact@v4
        with:
          name: execution-evidence
          path: .

  evaluate:
    needs: execute
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Record execution outcome
        run: |
          CONCLUSION="${{ needs.execute.result }}"
          echo "Execution conclusion: $CONCLUSION"
