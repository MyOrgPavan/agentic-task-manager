name: Agent - Plan
# A-01, A-02, B-03, B-04, A-03, A-04, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      scope:
        description: "Agent scope (backend/frontend/db)"
        required: true
      ticket_id:
        description: "Issue or ticket ID"
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: agent-plan-${{ github.event.issue.number || github.event.inputs.ticket_id }}
  cancel-in-progress: true

jobs:
  generate-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Fetch issue details
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TICKET="${{ github.event.issue.number || github.event.inputs.ticket_id || '0000' }}"
          gh issue view "$TICKET" --json title,body --jq '.title + "\n\n" + .body' > /tmp/issue-desc.txt 2>/dev/null || echo "Issue #$TICKET" > /tmp/issue-desc.txt

      - name: Generate plan artifact
        run: |
          SCOPE="${{ github.event.inputs.scope || 'backend' }}"
          TICKET="${{ github.event.issue.number || github.event.inputs.ticket_id || '0000' }}"
          python3 scripts/generate-plan.py \
            --scope "$SCOPE" \
            --ticket "$TICKET" \
            --risk low \
            --description-file /tmp/issue-desc.txt

      - uses: actions/upload-artifact@v4
        with:
          name: plan-artifact
          path: plans/

  propose-plan:
    needs: generate-plan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: plan-artifact
          path: plans/
      - name: Create branch and commit plan
        run: |
          SCOPE="${{ github.event.inputs.scope || 'backend' }}"
          TICKET="${{ github.event.issue.number || github.event.inputs.ticket_id || '0000' }}"
          BRANCH="agent/${SCOPE}/${TICKET}"
          git config user.name "agent-plan"
          git config user.email "agent-plan@github.local"
          git checkout -b "$BRANCH"
          git add plans/
          git commit -m "Plan: scope=${SCOPE} ticket=${TICKET}"
          git push origin "$BRANCH"
      - name: Open plan PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SCOPE="${{ github.event.inputs.scope || 'backend' }}"
          TICKET="${{ github.event.issue.number || github.event.inputs.ticket_id || '0000' }}"
          BRANCH="agent/${SCOPE}/${TICKET}"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Plan: ${SCOPE} / ${TICKET}" \
            --body-file "plans/plan-${TICKET}.md" \
            --label plan
