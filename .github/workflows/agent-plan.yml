name: Agent - Plan
# A-01, A-02, B-03, B-04, V-01, V-02, V-03, V-04, V-05, V-06, V-07, F-11
# F-11 Operational Reliability Checklist:
# - concurrency controls: present
# - risk-based plan gating: present
# - durable evidence collected: present
# - drift detection active: present (via drift-detection.yml)
# - retry limits enforced: present (max 3 retries)
# - rollback script available: present (scripts/rollback.sh)
# - escalation path configured: present
on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      scope:
        description: "Agent scope (backend/frontend/db)"
        required: true
      ticket_id:
        description: "Issue or ticket ID"
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: agent-plan-${{ github.event.issue.number || github.event.inputs.ticket_id }}
  cancel-in-progress: true

jobs:
  generate-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install PyYAML
      - name: Read risk classification
        id: risk
        run: |
          python -c "
import yaml
with open('.github/risk-classification.yml') as f:
    data = yaml.safe_load(f)
print(f'risk_level={data.get(\"default_risk\", \"medium\")}')
" >> $GITHUB_OUTPUT
      - name: Generate plan artifact (read-only)
        run: |
          python scripts/generate-plan.py \
            --scope "${{ github.event.inputs.scope || 'backend' }}" \
            --ticket "${{ github.event.issue.number || github.event.inputs.ticket_id || '0000' }}" \
            --risk "${{ steps.risk.outputs.risk_level }}"
      - uses: actions/upload-artifact@v4
        with:
          name: plan-artifact
          path: plans/

  propose-plan:
    needs: generate-plan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: plan-artifact
          path: plans/
      - name: Create branch and commit plan
        run: |
          BRANCH="agent/${{ github.event.inputs.scope || 'backend' }}/${{ github.event.issue.number || github.event.inputs.ticket_id || '0000' }}"
          git config user.name "agent-plan"
          git config user.email "agent-plan@github.local"
          git checkout -b "$BRANCH"
          git add plans/
          git commit -m "Plan: scope=${{ github.event.inputs.scope || 'backend' }} ticket=${{ github.event.issue.number || github.event.inputs.ticket_id || '0000' }}"
          git push origin "$BRANCH"
      - name: Open plan PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="agent/${{ github.event.inputs.scope || 'backend' }}/${{ github.event.issue.number || github.event.inputs.ticket_id || '0000' }}"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Plan: ${{ github.event.inputs.scope || 'backend' }} / ${{ github.event.issue.number || github.event.inputs.ticket_id || '0000' }}" \
            --body-file plans/plan-${{ github.event.issue.number || github.event.inputs.ticket_id || '0000' }}.md \
            --label plan

